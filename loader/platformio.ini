; T-Echo QSPI pins (MX25R1635F via variant P1.14/P1.15/P1.12/P1.13/P0.07/P0.05)
[env:kb-loader]
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = arduino
build_flags =
  -DNRF52_SERIES
  -DNRF52840_XXAA
  -DPIN_QSPI_SCK=46
  -DPIN_QSPI_CS=47
  -DPIN_QSPI_IO0=44
  -DPIN_QSPI_IO1=45
  -DPIN_QSPI_IO2=7
  -DPIN_QSPI_IO3=5
  -DLED_GREEN=LED_BUILTIN

; RAK4631 / WisMesh Pocket QSPI pins (P0.03/P0.26/P0.30/P0.29/P0.28/P0.02)
; Uses adafruit_feather_nrf52840 (same nRF52840 chip, same BSP) with pin overrides
[env:kb-loader-rak]
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = arduino
build_flags =
  -DNRF52_SERIES
  -DNRF52840_XXAA
  -DPIN_QSPI_SCK=3
  -DPIN_QSPI_CS=26
  -DPIN_QSPI_IO0=30
  -DPIN_QSPI_IO1=29
  -DPIN_QSPI_IO2=28
  -DPIN_QSPI_IO3=2
  -DLED_GREEN=LED_BUILTIN
